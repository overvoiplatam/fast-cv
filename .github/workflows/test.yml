name: test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    name: test (${{ matrix.os }}, node ${{ matrix.node }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node: [20, 22]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm test

  audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # Audit production deps at >=high. Per dep-policy in CLAUDE.md: this is our
      # only continuous signal for "is it time to bump?". Failure here is the trigger.
      - run: npm audit --omit=dev --audit-level=high

  shellcheck:
    name: shellcheck install.sh
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y shellcheck
      - run: shellcheck install.sh

  lint-self:
    name: eslint self-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Install eslint and plugins
        run: |
          npm install -g eslint
          npm install --no-save \
            eslint-plugin-sonarjs \
            eslint-plugin-security \
            typescript-eslint \
            eslint-plugin-react \
            eslint-plugin-react-hooks \
            eslint-plugin-vue \
            eslint-plugin-svelte \
            eslint-plugin-jsonc \
            eslint-plugin-jsdoc
      - run: node bin/fast-cv.js --tools=eslint .

  # Fast signal: exercises the npm install + symlink path on both OSes.
  # Finishes in ~1 min — gives a quick red light if the app side regresses
  # before the slow `--mode all` job below finishes.
  install-script:
    name: install.sh --mode app (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: bash install.sh --mode app
      - name: Verify symlink and version
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          which fast-cv
          fast-cv --version

  # Deep signal: provisions all 19 external tools — ruff/semgrep/mypy/vulture/
  # sqlfluff (pipx), eslint + plugins/jscpd/knip/tsc/stylelint/spectral/redocly/
  # markdownlint-cli2 (npm), bearer/golangci-lint/trivy (curl-piped binaries),
  # typos (cargo or pre-built), clippy (rustup), vale (brew/go/pre-built).
  # Runs on every push and PR. If a tool's upstream installer breaks or the
  # CDN flakes, we want to know — that's the only way to catch install drift.
  install-script-full:
    name: install.sh --mode all (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: bash install.sh --mode all
      - name: Verify fast-cv runs
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          fast-cv --version
