StylesPath = vale-styles
MinAlertLevel = warning
Packages = write-good, proselint

[*.{md,markdown,rst,adoc,txt}]
BasedOnStyles = write-good, proselint

# Vale's built-in spell check has massive false-positive rate on technical
# writing (flags every tool name, acronym, etc.). Keep disabled by default.
Vale.Spelling = NO
Vale.Terms = NO

# write-good: Keep high-signal rules, quiet noisy ones
write-good.Weasel = warning
write-good.ThereIs = suggestion
write-good.Passive = NO
write-good.E-Prime = NO
write-good.TooWordy = suggestion
write-good.Cliches = suggestion

# proselint: Keep high-signal rules, quiet stylistic preferences
proselint.Typography = warning
proselint.GenderBias = warning
proselint.Nonwords = warning
proselint.Cliches = suggestion
proselint.Needless = suggestion
