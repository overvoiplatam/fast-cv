# fast-cv default Spectral ruleset.
# Extends recommended rules for OpenAPI (OAS) and AsyncAPI.
# Users can override by dropping a local `.spectral.yaml` at the project root.

extends:
  - [spectral:oas, recommended]
  - [spectral:asyncapi, recommended]

rules:
  # Turn off rules that are noisy on real-world specs but rarely block consumers.
  # Users who want stricter validation can re-enable these in a local .spectral.yaml.
  oas3-unused-component: off      # Common in auto-generated specs with shared schemas
  operation-operationId: warn     # Nice to have, not load-bearing
  operation-description: warn
  operation-tag-defined: warn
  operation-tags: warn
  info-contact: warn
  info-description: warn
  info-license: warn
  tag-description: warn

overrides:
  # Looser rules on test fixtures and generated output
  - files:
      - "**/test/**"
      - "**/fixtures/**"
      - "**/generated/**"
    rules:
      oas3-valid-media-example: warn
